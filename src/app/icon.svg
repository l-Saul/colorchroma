<svg width="100" height="100" viewBox="0 0 100 100" fill="none" xmlns="http://www.w3.org/2000/svg">
  <defs>
    <linearGradient id="chroma" x1="0" y1="0" x2="100" y2="100" gradientUnits="userSpaceOnUse">
      <stop offset="0" stop-color="#f472b6"/>
      <stop offset="0.5" stop-color="#5eead4"/>
      <stop offset="1" stop-color="#818cf8"/>
    </linearGradient>
    <radialGradient id="shine" cx="32" cy="30" r="60" gradientUnits="userSpaceOnUse">
      <stop offset="0" stop-color="#ffffff" stop-opacity="0.55"/>
      <stop offset="0.6" stop-color="#ffffff" stop-opacity="0"/>
    </radialGradient>
  </defs>

  <!-- Squircle background with the brand gradient -->
  <rect x="4" y="4" width="92" height="92" rx="26" fill="url(#chroma)"/>
  <rect x="4" y="4" width="92" height="92" rx="26" fill="url(#shine)"/>

  <!-- Color-wheel handle, matching the picker -->
  <circle cx="50" cy="50" r="17" fill="#ffffff" fill-opacity="0.12"/>
  <circle cx="50" cy="50" r="11" fill="#ffffff" stroke="#0f1115" stroke-opacity="0.15" stroke-width="2.5"/>
</svg>
